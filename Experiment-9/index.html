<!DOCTYPE html>
<html lang="en" ng-app="formApp">
<head>
    <meta charset="UTF-8">
    <title>AngularJS Form with CSS & Events</title>
    <!-- Include AngularJS library from the AngularJS CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .form-container {
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }

        /* AngularJS validation CSS classes */
        .ng-invalid.ng-dirty {
            border-color: #dc3545; /* Red border for invalid input */
        }
        .ng-valid.ng-dirty {
            border-color: #28a745; /* Green border for valid input */
        }
        .error-message {
            color: #dc3545;
            font-size: 0.8em;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body ng-controller="formController">

    <div class="form-container">
        <h2>User Registration</h2>
        <!-- ng-submit directive handles form submission event -->
        <form name="userForm" ng-submit="submitForm()">
            <div class="form-group">
                <label for="name">Name:</label>
                <!-- ng-model binds input to the scope; 'required' applies HTML5 validation -->
                <input type="text" id="name" name="name" ng-model="user.name" required>
                <!-- Show error message if input is invalid and the user has interacted with it -->
                <span class="error-message" ng-show="userForm.name.$dirty && userForm.name.$invalid">Name is required.</span>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <!-- type="email" applies email validation -->
                <input type="email" id="email" name="email" ng-model="user.email" required>
                <span class="error-message" ng-show="userForm.email.$dirty && userForm.email.$invalid">Valid email is required.</span>
            </div>

            <!-- ng-click directive handles button click event for reset -->
            <button type="button" ng-click="resetForm()">Reset</button>
            <!-- Disable button if the form is invalid -->
            <button type="submit" ng-disabled="userForm.$invalid">Submit</button>
        </form>
    </div>

    <!-- AngularJS application script -->
    <script>
        // Define the AngularJS module and controller
        angular.module('formApp', [])
            .controller('formController', function($scope) {
                // Initialize user data model
                $scope.user = {
                    name: '',
                    email: ''
                };

                // Function to handle form submission event (ng-submit)
                $scope.submitForm = function() {
                    if ($scope.userForm.$valid) {
                        alert('Form submitted successfully!\nName: ' + $scope.user.name + '\nEmail: ' + $scope.user.email);
                        $scope.resetForm();
                    }
                };

                // Function to handle form reset event (ng-click)
                $scope.resetForm = function() {
                    $scope.user = {
                        name: '',
                        email: ''
                    };
                    // Reset the form's validation state
                    $scope.userForm.$setPristine();
                    $scope.userForm.$setUntouched();
                };
            });
    </script>
</body>
</html>
